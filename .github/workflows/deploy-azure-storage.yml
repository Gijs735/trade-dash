name: Deploy website to Azure Storage

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: azure-storage-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      # Uses Azure Static Website hosting's default container unless overridden
      # by a repository variable named AZURE_STORAGE_CONTAINER.
      AZURE_STORAGE_CONTAINER: ${{ vars.AZURE_STORAGE_CONTAINER || '$web' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site files
        run: |
          mkdir -p _site
          rsync -av --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '_site/' \
            --exclude 'LICENSE' \
            --exclude 'README.md' \
            ./ _site/

      - name: Install AzCopy
        run: |
          curl -sL https://aka.ms/downloadazcopy-v10-linux -o azcopy.tar.gz
          tar -xf azcopy.tar.gz
          sudo cp ./azcopy_linux_amd64_*/azcopy /usr/local/bin/azcopy
          azcopy --version

      - name: Deploy to Azure Storage
        env:
          AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          AZURE_STORAGE_SAS_TOKEN: ${{ secrets.AZURE_STORAGE_SAS_TOKEN }}
        run: |
          set -euo pipefail

          : "${AZURE_STORAGE_ACCOUNT:?Set the AZURE_STORAGE_ACCOUNT repository secret.}"
          : "${AZURE_STORAGE_SAS_TOKEN:?Set the AZURE_STORAGE_SAS_TOKEN repository secret.}"
          : "${AZURE_STORAGE_CONTAINER:?Set AZURE_STORAGE_CONTAINER or leave it unset to use the default static website container.}"

          sas_token="${AZURE_STORAGE_SAS_TOKEN#\?}"
          echo "::add-mask::$AZURE_STORAGE_SAS_TOKEN"
          echo "::add-mask::$sas_token"

          destination_url="https://${AZURE_STORAGE_ACCOUNT}.blob.core.windows.net/${AZURE_STORAGE_CONTAINER}?${sas_token}"

          azcopy sync "$GITHUB_WORKSPACE/_site" "$destination_url" \
            --recursive=true \
            --delete-destination=true \
            --exclude-path=strc-dividends.json \
            --log-level=ERROR
